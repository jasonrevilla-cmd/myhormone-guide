name: Daily Blog Post

on:
  schedule:
    # 8:00 AM CST = 14:00 UTC
    - cron: "0 14 * * *"
  workflow_dispatch: # manual trigger for testing

jobs:
  generate-post:
    runs-on: ubuntu-latest
    permissions:
      contents: write # required for git push

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Validate ANTHROPIC_API_KEY secret
        run: |
          if [ -z "$ANTHROPIC_API_KEY" ]; then
            echo "::error::ANTHROPIC_API_KEY secret is not set. Add it under Settings → Secrets → Actions."
            exit 1
          fi
          echo "✅ ANTHROPIC_API_KEY is present (length: ${#ANTHROPIC_API_KEY} chars)"
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Generate today's post
        run: node generate-post.js
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Check for new or modified files
        id: check-changes
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "Changed files:"
            git status --short
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "No file changes detected."
          fi

      - name: Commit new post
        if: steps.check-changes.outputs.has_changes == 'true'
        run: |
          git config user.name "BHRT Bot"
          git config user.email "bot@myhormoneguide.com"
          git add src/content/posts/ topics.json
          git diff --staged --quiet || git commit -m "auto-post: $(date +%Y-%m-%d)"
          git push

      - name: No changes to commit
        if: steps.check-changes.outputs.has_changes != 'true'
        run: echo "ℹ️ No new post generated (queue may be empty or QC failed). Check the Generate step logs above."
